# Production Profile (RDS MySQL)

# Database Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:database-1.ch6kaiegwmj8.ap-southeast-2.rds.amazonaws.com}:${DB_PORT:3306}/${DB_NAME:chatdb}?useSSL=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Production JPA Settings
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Kafka Broker ?? (?? ?? ?? ??)
spring.kafka.bootstrap-servers=prod-kafka1:9092,prod-kafka2:9092

# Consumer ??
spring.kafka.consumer.group-id=chatting
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Producer ??
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.application.name=backend
